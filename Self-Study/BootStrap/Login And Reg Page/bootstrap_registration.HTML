<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration</title>
    <link rel="stylesheet" href="/GIT/style.css">
</head>
<body>
    <div style="max-width: 400px; margin: 50px auto; padding: 20px; border: 1px solid #ddd; border-radius: 4px; background-color: lightblue;">
        <h2 align="center" style="background-color: lightgray; padding: 10px;">Registration Form</h2>
    <form>
            <div class="form-group">
                <label for="exampleFormControlInput1">Email address</label>
                <input type="email" class="form-control" id="exampleFormControlInput1" placeholder="name@example.com">
            </div>

            <br>

            <div class="form-group">
                <label for="exampleFormControlTextarea1">Password</label>
                <input type="password" class="form-control" id="exampleFormControlInput1" placeholder="Password">
            </div>

            <br>

            <div class="form-group">
                <label for="exampleFormControlSelect1">Select Course</label>
                <select class="form-control" id="exampleFormControlSelect1">
                <option>DAC</option>
                <option>MC</option>
                <option>BDA</option>
                </select>
            </div>

            <br>

            <div class="form-group">
                <label for="exampleFormControlSelect2">Select Group</label>
                <select multiple class="form-control" id="exampleFormControlSelect2">
                    <option>Group 1</option>
                    <option>Group 2</option>
                    <option>Group 3</option>
                    <option>Group 4</option>
                    <option>Group 5</option>
                </select>
            </div>

            <br>

            <div class="form-group">
                <label for="exampleFormControlTextarea1">Example textarea</label>
                <textarea class="form-control" id="exampleFormControlTextarea1" rows="3"></textarea>
            </div>

            <br>

            <div style="display: grid; place-items: center;">
                <button type="submit" class="btn btn-primary" >Submit</button>
            </div>
    </form>
    </div>
</body>
</html>
