<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">
  <h2 class="text-center mb-4">Products</h2>

  <div class="d-flex flex-wrap justify-content-center gap-4">

    <div class="card" style="width: 18rem;">
      <img src="../../../../../../../Downloads/96305.jpg" class="card-img-top">
      <div class="card-body">
        <h5 class="card-title">Wireless Headphones</h5>
        <p class="card-text">Good sound quality with long battery life.</p>
        <p class="fw-bold">4500</p>
        <button class="btn btn-primary w-100">Buy Now</button>
      </div>
    </div>

    <div class="card" style="width: 18rem;">
      <img src="../../../../../../../Downloads/96305.jpg" class="card-img-top">
      <div class="card-body">
        <h5 class="card-title">Smart Watch</h5>
        <p class="card-text">Track your fitness and notifications easily.</p>
        <p class="fw-bold">6000</p>
        <button class="btn btn-primary w-100">Buy Now</button>
      </div>
    </div>

    <div class="card" style="width: 18rem;">
      <img src="https://www.loudersound.com/features/loudest-bluetooth-speakers" class="card-img-top">
      <div class="card-body">
        <h5 class="card-title">Bluetooth Speaker</h5>
        <p class="card-text">Compact design with powerful sound.</p>
        <p class="fw-bold">3000</p>
        <button class="btn btn-primary w-100">Buy Now</button>
      </div>
    </div>

  </div>
</div>

</html>
