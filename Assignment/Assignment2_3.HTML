<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunbeam Form</title>
</head>
<body>

    <div style="text-align:center;">
        <img src="/GIT/PULL/WPT/wpt/Day02/resources/sunbeam.jpg" width="400" alt="Sunbeam Logo">
        <h1>Sunbeam Registration Form</h1>
    </div>

    <table width="95%" align="center">
        <tr>
            <td width="50%" align="center">
                <iframe width="560" height="315" src="https://www.youtube-nocookie.com/embed/kyqJ_FId-_w?si=19o5uDfnUr9QAxtG&amp;start=13" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
            </td>

            <td width="50%">
                <form>
                    <table cellpadding="5">
                        <tr>
                            <td>Name:</td>
                            <td><input type="text" name="name"></td>
                        </tr>

                        <tr>
                            <td>BirthDate:</td>
                            <td><input type="date" name="dob"></td>
                        </tr>

                        <tr>
                            <td>Email:</td>
                            <td><input type="email" name="email"></td>
                        </tr>

                        <tr>
                            <td>Password:</td>
                            <td><input type="password" name="password"></td>
                        </tr>

                        <tr>
                            <td>Address:</td>
                            <td><textarea name="address" rows="3"></textarea></td>
                        </tr>

                        <tr>
                            <td>Gender:</td>
                            <td>
                                <input type="radio" name="gender" value="male"> Male
                                <input type="radio" name="gender" value="female"> Female
                            </td>
                        </tr>

                        <tr>
                            <td>Upload Photo:</td>
                            <td><input type="file" name="photo"></td>
                        </tr>

                        <tr>
                            <td>Course:</td>
                            <td>
                                <select name="course">
                                    <option>Select course</option>
                                    <option>PG-DAC</option>
                                    <option>PG-DBDA</option>
                                </select>
                            </td>
                        </tr>

                        <tr>
                            <td>Skill Set:</td>
                            <td>
                                <input type="checkbox" name="skills" value="java"> Java
                                <input type="checkbox" name="skills" value="cpp"> CPP
                                <input type="checkbox" name="skills" value="os"> OS
                            </td>
                        </tr>

                        <tr>
                            <td></td>
                            <td>
                                <input type="submit" value="Register">
                                <input type="reset" value="Clear">
                            </td>
                        </tr>

                    </table>
                </form>
            </td>
        </tr>
    </table>

</body>
</html>
