<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>


<body class="p-4"> 
    <div class="container">
        
        <div class="row align-items-end mb-3"> 
            <div class="col-md-4">
                <label class="form-label">Name</label>
                <input type="text" id="nameInput" class="form-control">
            </div>

            <div class="col-auto">
                <button class="btn btn-primary" onclick="save()">Save</button>
                <button class="btn btn-primary" onclick="sort()">Sort</button>
            </div>
        </div>

        <hr>
    <div>
        <table border="1" class="table">
            <thead>
                <tr>
                    <td id="name"><b>Name</b></td>
                </tr>
            </thead>
            <tbody id="tbody">

            </tbody>
        </table>
    </div>
    <script>
        let generatePid = 0

        function save() 
        {
            const arr = document.getElementsByTagName('input')
            const pid = ++generatePid
            const name = arr[0].value

            const tbody = document.getElementById('tbody')

            tbody.innerHTML += `<tr>
                                    <td>${name}</td>
                                </tr>`

        }

        function sort()
        {
            const tbody = document.getElementById('tbody')
            const rows = Array.from(tbody.getElementsByTagName('tr'))

            rows.sort((a, b) => 
            {
                const nameA = a.cells[0].innerText
                const nameB = b.cells[0].innerText

                if (nameA < nameB) return -1
                if (nameA > nameB) return 1
                return 0
            })
            rows.forEach(row => tbody.appendChild(row))

        }
    </script>
</body>

</html>
