<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Our Products Page</title>
    <style>
        
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            padding: 50px;
        }

        
        .product-container {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        
        .card {
            background-color: white;
            border: 1px solid #ddd;
            padding: 20px;
            width: 250px;
            border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .card img {
            width: 100%;
            height: 150px;
            object-fit: contain;
            margin-bottom: 15px;
        }

        .card h4 {
            margin: 10px 0;
            font-size: 18px;
        }

        .description {
            font-size: 12px;
            color: #666;
            margin-bottom: 15px;
            height: 40px;
        }

        .price {
            color: orange;
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 15px;
        }

        
        .add-to-cart {
            background-color: #28a745;
            
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.3s ease;
        }

        
        .add-to-cart:hover {
            background-color: #218838;
            
        }
    </style>
</head>

<body>

    <h2>Our Products</h2>

    <div class="product-container">
        
        <div class="card">
            <img src="/GIT/PUSH/WPT/WPT/Assignment/Item 1.png" alt="">
            <h4>Product 1</h4>
            <p class="description">High-quality product that meets your needs.</p>
            <div class="price">805.08</div>
            <button class="add-to-cart">Add to Cart</button>
        </div>

        
        <div class="card">
            <img src="/GIT/PUSH/WPT/WPT/Assignment/Item 2.png" alt="">
            <h4>Product 2</h4>
            <p class="description">Excellent craftsmanship and durable design.</p>
            <div class="price">11.50</div>
            <button class="add-to-cart">Add to Cart</button>
        </div>


        <div class="card">
            <img src="/GIT/PUSH/WPT/WPT/Assignment/Item 3.png" alt="">
            <h4>Product 3</h4>
            <p class="description">Reliable and affordable choice for everyone.</p>
            <div class="price">12.00</div>
            <button class="add-to-cart">Add to Cart</button>
        </div>
    </div>

</body>

</html>
