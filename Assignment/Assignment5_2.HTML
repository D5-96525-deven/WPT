<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>


<body class="p-4"> 
    <h1 align="center">Calculator</h1>
    <div class="container">

    <div>
        <table border="1" class="table">
            <thead>
                <tr>
                    <td>Enter Number 1:</td>
                    <td>
                    <input type="number" id="num1" class="form-control">
                    </td>
                </tr>

                <tr>
                    <td>Enter Number 2:</td>
                    <td>
                    <input type="number" id="num2" class="form-control">
                    </td>
                </tr>

                <tr>
                    <td> Result</td>
                    <td id="resultop"></td>
                </tr>
            </thead>

            <tfoot>
                <td colspan="2">
                    <button class="btn btn-primary" onclick="add()">Addition</button>
                    <button class="btn btn-primary" onclick="sub()">Subtraction</button>
                    <button class="btn btn-primary" onclick="mul()">Multiplication</button>
                    <button class="btn btn-primary" onclick="div()">Divide</button>
                </td>
            </tfoot>
        </table>
    </div>

    <script>



        function add()
        {
            const num1 = Number(document.getElementById('num1').value)
            const num2 = Number(document.getElementById('num2').value)

            const resultCell = document.getElementById("resultop")

            resultCell.innerText = num1 + num2;

        }

        function sub()
        {
            const num1 = Number(document.getElementById('num1').value)
            const num2 = Number(document.getElementById('num2').value)

            const resultCell = document.getElementById("resultop")

            resultCell.innerText = num1 - num2;

        }

        function mul()
        {
            const num1 = Number(document.getElementById('num1').value)
            const num2 = Number(document.getElementById('num2').value)

            const resultCell = document.getElementById("resultop")

            resultCell.innerText = num1 * num2;

        }

        function div()
        {
            const num1 = Number(document.getElementById('num1').value)
            const num2 = Number(document.getElementById('num2').value)

            const resultCell = document.getElementById("resultop")

            resultCell.innerText = num1 / num2;

        }
    </script>
</body>

</html>
